name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f README.zh-CN.md
          test -f scripts/auto-heal-ai.sh
          test -f scripts/health-check.sh
          test -f install.sh
          test -f docs/architecture.md
          test -f docs/security.md

      - name: Bash syntax check
        run: |
          bash -n scripts/auto-heal-ai.sh
          bash -n scripts/health-check.sh
          bash -n install.sh
          bash -n bootstrap.sh

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck scripts/auto-heal-ai.sh
          shellcheck scripts/health-check.sh
          shellcheck install.sh
          shellcheck bootstrap.sh
